<svg width="1280" height="180" viewBox="0 0 1280 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 760 58px "Segoe UI", Arial, sans-serif; fill: #F0F6FC; }
    .line { font: 19px Consolas, "Fira Code", monospace; fill: #8B949E; }
    .ui { font: 12px Consolas, "Fira Code", monospace; fill: #8B949E; }
    .addr { font: 13px Consolas, "Fira Code", monospace; fill: #6E7681; }
    .bytes { font: 13px Consolas, "Fira Code", monospace; fill: #79C0FF; }
    .mn { font: 13px Consolas, "Fira Code", monospace; fill: #F0F6FC; }
    .op { font: 13px Consolas, "Fira Code", monospace; fill: #A5D6FF; }
    .comment { font: 13px Consolas, "Fira Code", monospace; fill: #D2A8FF; }
    .cursor { animation: blink 1.1s steps(2, start) infinite; }
    .name-step { opacity: 0; }
    .name-1 { animation: name1 6.4s steps(1, end) infinite; }
    .name-2 { animation: name2 6.4s steps(1, end) infinite; }
    .name-3 { animation: name3 6.4s steps(1, end) infinite; }
    .name-4 { animation: name4 6.4s steps(1, end) infinite; }
    .name-5 { animation: name5 6.4s steps(1, end) infinite; }
    .pulse-a { animation: pulseA 19.6s ease-in-out infinite; }
    .pulse-b { animation: pulseB 19.6s ease-in-out infinite; }
    .bio-a { animation: bioA 10.8s ease-in-out infinite; }
    .bio-b { animation: bioB 10.8s ease-in-out infinite; }
    .bio-c { animation: bioC 10.8s ease-in-out infinite; }
    .f1 { animation: f1 19.6s ease-in-out infinite; }
    .f2 { animation: f2 19.6s ease-in-out infinite; }
    .f3 { animation: f3 19.6s ease-in-out infinite; }
    .f4 { animation: f4 19.6s ease-in-out infinite; }
    .f5 { animation: f5 19.6s ease-in-out infinite; }
    .f6 { animation: f6 19.6s ease-in-out infinite; }
    .f7 { animation: f7 19.6s ease-in-out infinite; }
    @keyframes blink { 0%, 42% { opacity: 1; } 43%, 100% { opacity: 0; } }
    @keyframes name1 { 0%, 9.9%, 20%, 93.9%, 98.6%, 100% { opacity: 0; } 10%, 19.9%, 94%, 98.5% { opacity: 1; } }
    @keyframes name2 { 0%, 19.9%, 30%, 87.9%, 94%, 100% { opacity: 0; } 20%, 29.9%, 88%, 93.9% { opacity: 1; } }
    @keyframes name3 { 0%, 29.9%, 40%, 81.9%, 88%, 100% { opacity: 0; } 30%, 39.9%, 82%, 87.9% { opacity: 1; } }
    @keyframes name4 { 0%, 39.9%, 50%, 73.9%, 82%, 100% { opacity: 0; } 40%, 49.9%, 74%, 81.9% { opacity: 1; } }
    @keyframes name5 { 0%, 49.9%, 74%, 100% { opacity: 0; } 50%, 73.9% { opacity: 1; } }
    @keyframes pulseA { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }
    @keyframes pulseB { 0%, 100% { opacity: .2; } 34%, 68% { opacity: .8; } }
    @keyframes bioA { 0%, 25% { opacity: 1; } 32%, 95% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes bioB { 0%, 29% { opacity: 0; } 36%, 58% { opacity: 1; } 65%, 100% { opacity: 0; } }
    @keyframes bioC { 0%, 62% { opacity: 0; } 69%, 88% { opacity: 1; } 95%, 100% { opacity: 0; } }
